<div class="d-flex flex-column flex-md-row gap-3 justify-content-between align-items-md-center mb-4">
  <h1 class="h4 mb-0">
    <strong>
      {% if user.is_authenticated %}
        Welcome - {{ user.first_name }} {% if user.is_staff %}(Admin){% endif %}
      {% else %}
        Digital Task Management System
      {% endif %}
    </strong>
  </h1>
  {% if user.is_authenticated and user.is_staff %}
    <a href="{% url 'adminlogout' %}" class="btn btn-danger">Logout</a>
  {% elif user.is_authenticated %}
    <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
  {% endif %}
</div>
